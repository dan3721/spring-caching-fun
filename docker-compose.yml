services:
  postgres:
    image: postgres:16
    container_name: pokemon-postgres
    environment:
      POSTGRES_DB: pokemon
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: pokemon
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./set-data.json:/docker-entrypoint-initdb.d/set-data.json:ro

  redis:
    image: redis:7-alpine
    container_name: pokemon-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
